services:
  # Web Service
  - type: web
    name: vktn-granites-api
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node backend/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://vktn-granites.vercel.app
    healthCheckPath: /api/health
